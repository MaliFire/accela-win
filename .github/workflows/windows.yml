name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Get latest release tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = gh release view --repo ciscosweater/enter-the-wired --json tagName --jq .tagName
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Download Linux tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ steps.latest.outputs.tag }} --repo ciscosweater/enter-the-wired --pattern "*-linux.tar.gz" --output ACCELA.tar.gz

      - name: Extract tar.gz → tar
        run: |
          $tar = (Get-ChildItem ACCELA.tar.gz).FullName
          7z x "$tar" -y
      - name: Extract tar → outer bin/
        run: |
          $tar = (Get-ChildItem *.tar).FullName
          7z x "$tar" -y

      - name: Extract AppImage → source
        run: |
          $appimg = (Get-ChildItem -Recurse -Filter "*.AppImage").FullName
          cmd /c "7z x `"$appimg`" -oAppImage -y 2>nul"
          exit 0

      - name: Locate source directory
        id: find-src
        run: |
          $src = Get-ChildItem -Path AppImage -Recurse -Filter "main.py" `
            | Where-Object { $_.FullName -notmatch '\.venv' } `
            | Select-Object -First 1 -ExpandProperty DirectoryName
          echo "src-dir=$src" >> $env:GITHUB_OUTPUT

      - name: Set up Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install PyQt6 pyqt6-sip pyqt6-qt6
          pip install requests urllib3 psutil numpy pillow pyyaml
          pip install just_playback urwid vdf cryptography gevent zstandard
          pip install "steam[client]"

      - name: Build with PyInstaller
        run: |
          cd "${{ steps.find-src.outputs.src-dir }}"
          pyinstaller --onefile --windowed --name ACCELA `
            --icon res/logo/icon.ico `
            --add-data "res;res" `
            --add-data "deps;deps" `
            --hidden-import PyQt6.QtSvg `
            --hidden-import PyQt6.QtNetwork `
            --hidden-import gevent `
            --hidden-import urwid.display.common `
            --hidden-import urwid.display.raw `
            --hidden-import urwid.display.curses `
            --hidden-import urwid.display.escape `
            --hidden-import urwid.display.html_fragment `
            --hidden-import urwid.display.lcd `
            --hidden-import urwid.display.web `
            --collect-all steam `
            main.py
          Copy-Item -Path "dist\ACCELA.exe" -Destination "${{ github.workspace }}\ACCELA.exe"

      - name: Upload to GitHub Release
        uses: xresloader/upload-to-github-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          file: ACCELA.exe
          tag_name: ${{ steps.latest.outputs.tag }}
          overwrite: true
          draft: false
          default_release_name: "ACCELA ${{ steps.latest.outputs.tag }} (Windows)"
          default_release_body: "Windows build of ACCELA ${{ steps.latest.outputs.tag }}"
